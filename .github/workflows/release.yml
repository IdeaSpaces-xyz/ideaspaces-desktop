name: Release

# Push a tag like `v0.2.0` (use `npm run release 0.2.0` to bump + tag) and this
# builds a universal macOS DMG and publishes it as a GitHub Release.
on:
  push:
    tags:
      - "v*"

# One build per tag — guards against a force-pushed tag racing two publishes.
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

# The job needs to create the release and upload the DMG.
permissions:
  contents: write

jobs:
  release-macos:
    name: Build & publish macOS DMG (universal)
    runs-on: macos-14 # Apple Silicon runner; cross-compiles the Intel slice too.
    timeout-minutes: 45
    env:
      # 'true' only when the signing cert secret exists. Evaluates to a plain
      # 'true'/'false' string — the secret value itself is never exposed here.
      ENABLE_SIGNING: ${{ secrets.APPLE_CERTIFICATE != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # bun compiles the @ideaspaces/cli bundle into the native sidecar.
      - uses: oven-sh/setup-bun@v2

      # Both macOS arches — the universal app links an aarch64 + x86_64 slice.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # package-lock pins @ideaspaces/cli over ssh; the runner has no SSH key.
      # Rewrite to anonymous HTTPS (public repo). No token needed.
      - name: Force HTTPS for GitHub git fetch
        run: git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - name: Install dependencies
        run: npm ci

      # A tag can be pushed to a commit that never went through PR CI — re-run
      # the frontend quality gate here so a broken build never ships in a DMG.
      - name: Frontend checks
        run: npm run typecheck && npm run lint && npm test && npm run build

      # Inject the Apple signing/notarization secrets ONLY when a cert exists —
      # so adding the secrets flips signing on with no other change. Skipped
      # today (unsigned): the Tauri bundler treats an empty-but-present
      # APPLE_CERTIFICATE as "sign me" and fails importing it, so the vars must
      # be absent entirely, not empty.
      - name: Configure Apple signing
        if: env.ENABLE_SIGNING == 'true'
        run: |
          {
            echo "APPLE_CERTIFICATE<<__CERT__"
            echo "${{ secrets.APPLE_CERTIFICATE }}"
            echo "__CERT__"
            echo "APPLE_CERTIFICATE_PASSWORD=${{ secrets.APPLE_CERTIFICATE_PASSWORD }}"
            echo "APPLE_SIGNING_IDENTITY=${{ secrets.APPLE_SIGNING_IDENTITY }}"
            echo "APPLE_ID=${{ secrets.APPLE_ID }}"
            echo "APPLE_PASSWORD=${{ secrets.APPLE_PASSWORD }}"
            echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}"
          } >> "$GITHUB_ENV"

      - name: Build & publish release
        # Pinned to a commit SHA (supply-chain hygiene for a release/signing
        # workflow); bump deliberately. action-v0.6.2.
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tells build-sidecar.mjs to produce the universal sidecars.
          SIDECAR_UNIVERSAL: "1"
          # Apple signing vars are injected by the step above only when present
          # (the secrets resolve there); absent today = unsigned build.
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "IdeaSpaces ${{ github.ref_name }}"
          # Publish as a draft — open the DMG and confirm it launches before
          # clicking "Publish release". Flip to false once the pipeline is
          # battle-tested (and signing lands, so there's nothing to hand-verify).
          releaseDraft: true
          prerelease: false
          # bundle_dmg.sh flakes intermittently on headless runners (hdiutil /
          # Finder AppleScript) — re-try the build/upload before failing the run.
          retryAttempts: 2
          args: --target universal-apple-darwin
          releaseBody: |
            Universal macOS build (Apple Silicon + Intel). Download the `.dmg`,
            open it, and drag **IdeaSpaces** to Applications.

            > **Unsigned build.** macOS Gatekeeper will block the first launch
            > ("Apple cannot check it for malicious software"). Either
            > **right-click the app → Open** and confirm once, or run:
            > ```
            > xattr -dr com.apple.quarantine /Applications/IdeaSpaces.app
            > ```
            > Signing + notarization is a tracked follow-up.
